title: "宖伐縺ｯ縺倥ａ縺ｦ縺ｮWeb繧ｵ繧､繝亥ł髢倶ｽ馴ｨ謎ｼ夸沐ｰ"

lang: ja
remote_theme: "mmistakes/minimal-mistakes@4.24.0"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

locale: ja_JP
title_separator: "|"
minimal_mistakes_skin: "sky" # 蜈ｨ菴薙＂濶ｲ蜷医＞

breadcrumbs: true
logo: "/assets/images/logo-150.png"
include:
  - _pages

defaults:
  - scope:
      path: ""
    values:
      header:
        overlay_image: /assets/images/mizumi.jpeg
        overlay_filter: 0.5
  # pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      author: default

theme: jekyll-theme-slate
